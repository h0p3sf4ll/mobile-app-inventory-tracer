<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AppSec Inventory Service</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Application inventory</p>
          <h1>AppSec Inventory Service</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost" id="refreshScans" type="button">Refresh</button>
          <button class="primary" id="startScan" type="button">Run scan</button>
        </div>
      </header>

      <section class="layout">
        <form class="panel form-panel" id="scanForm">
          <div class="section-heading">
            <h2>Source</h2>
            <span class="status-chip idle" id="formStatus">Ready</span>
          </div>

          <div class="segmented" role="radiogroup" aria-label="Provider">
            <label>
              <input type="radio" name="provider" value="azure-devops" checked>
              <span>Azure DevOps</span>
            </label>
            <label>
              <input type="radio" name="provider" value="github-enterprise">
              <span>GitHub Enterprise</span>
            </label>
          </div>

          <div class="field-grid">
            <label>
              <span class="label-line">
                <span>Organization</span>
                <span class="field-badge required">Required</span>
              </span>
              <input name="org" autocomplete="organization" placeholder="FabrikamCloud" required>
            </label>
            <label class="provider-azure">
              <span class="label-line">
                <span>Project</span>
                <span class="field-badge optional">Optional</span>
              </span>
              <input name="project" placeholder="All projects if blank">
            </label>
            <label class="provider-github hidden">
              <span class="label-line">
                <span>Repository</span>
                <span class="field-badge optional">Optional</span>
              </span>
              <input name="repo" placeholder="All repositories if blank">
            </label>
            <label class="provider-github hidden full">
              <span class="label-line">
                <span>GitHub API URL</span>
                <span class="field-badge required">Required</span>
              </span>
              <input name="baseUrl" placeholder="https://github.example.com/api/v3">
            </label>
            <div class="full secret-field">
              <label for="scanToken">
                <span class="label-line">
                  <span>Token</span>
                  <span class="field-badge optional">Optional</span>
                </span>
              </label>
              <input id="scanToken" name="token" type="password" autocomplete="off" placeholder="Uses environment token if blank">
              <button class="icon-button" id="toggleToken" type="button" title="Show token">Show</button>
            </div>
          </div>

          <div class="section-heading compact">
            <h2>Scan</h2>
            <button class="ghost small" id="resetDefaults" type="button">Reset defaults</button>
          </div>

          <div class="field-grid">
            <label>
              <span class="label-line">
                <span>Output prefix</span>
                <span class="default-badge">Default: appsec_inventory_service</span>
              </span>
              <input name="outPrefix" value="appsec_inventory_service">
            </label>
            <label>
              <span class="label-line">
                <span>Confidence</span>
                <span class="default-badge">Default: Medium</span>
              </span>
              <select name="minConfidence">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>
            <label>
              <span class="label-line">
                <span>Activity</span>
                <span class="default-badge">Default: Latest</span>
              </span>
              <select name="activityMode">
                <option value="latest" selected>Latest</option>
                <option value="contributors">Contributors</option>
              </select>
            </label>
            <label>
              <span class="label-line">
                <span>Branch age days</span>
                <span class="default-badge">Default: 90</span>
              </span>
              <input name="branchAgeDays" type="number" min="1" value="90">
            </label>
            <label>
              <span class="label-line">
                <span>Repo workers</span>
                <span class="default-badge">Default: 8</span>
              </span>
              <input name="maxWorkers" type="number" min="1" value="8">
            </label>
            <label>
              <span class="label-line">
                <span>Branch workers</span>
                <span class="default-badge">Default: 16</span>
              </span>
              <input name="branchWorkers" type="number" min="1" value="16">
            </label>
            <label>
              <span class="label-line">
                <span>Content workers</span>
                <span class="default-badge">Default: 16</span>
              </span>
              <input name="contentWorkers" type="number" min="1" value="16">
            </label>
            <label>
              <span class="label-line">
                <span>Commit limit</span>
                <span class="default-badge">Default: 0</span>
              </span>
              <input name="maxCommitsPerRepo" type="number" min="0" value="0">
            </label>
            <label>
              <span class="label-line">
                <span>Timeout</span>
                <span class="default-badge">Default: 30</span>
              </span>
              <input name="timeout" type="number" min="1" value="30">
            </label>
            <label>
              <span class="label-line">
                <span>Store country</span>
                <span class="default-badge">Default: US</span>
              </span>
              <input name="storeCountry" maxlength="2" value="US">
            </label>
            <label>
              <span class="label-line">
                <span>Store timeout</span>
                <span class="default-badge">Default: 15</span>
              </span>
              <input name="storeTimeout" type="number" min="1" value="15">
            </label>
            <label class="toggle-row">
              <input name="storeLookup" type="checkbox">
              <span class="toggle-copy">
                <span>Store lookup</span>
                <small>Optional, default off</small>
              </span>
            </label>
            <label class="toggle-row">
              <input name="verbose" type="checkbox">
              <span class="toggle-copy">
                <span>Verbose logs</span>
                <small>Optional, default off</small>
              </span>
            </label>
          </div>
        </form>

        <section class="workspace">
          <div class="panel hero-panel">
            <div class="metric-row">
              <div>
                <span class="metric-label">Status</span>
                <strong id="activeStatus">Idle</strong>
              </div>
              <div>
                <span class="metric-label">Assets</span>
                <strong id="detectedCount">0</strong>
              </div>
              <div>
                <span class="metric-label">Progress</span>
                <strong id="progressValue">0%</strong>
              </div>
              <div>
                <span class="metric-label">ETA</span>
                <strong id="etaValue">Not started</strong>
              </div>
              <div>
                <span class="metric-label">Runtime</span>
                <strong id="runtimeValue">0s</strong>
              </div>
            </div>
            <div class="active-run">
              <div>
                <p class="eyebrow">Active scan</p>
                <h2 id="activeTitle">No scan selected</h2>
              </div>
              <div class="run-actions">
                <button class="ghost" id="copyCommand" type="button" disabled>Copy command</button>
                <button class="danger" id="stopScan" type="button" disabled>Stop</button>
              </div>
            </div>
            <pre class="command-line" id="commandLine">appsec-inventory-service</pre>
          </div>

          <div class="work-grid">
            <section class="panel runs-panel">
              <div class="section-heading">
                <h2>Runs</h2>
                <span id="scanCount">0</span>
              </div>
              <div class="run-list" id="runList"></div>
            </section>

            <section class="panel reports-panel">
              <div class="section-heading">
                <h2>Reports</h2>
                <span id="reportCount">0</span>
              </div>
              <div class="report-list" id="reportList"></div>
            </section>
          </div>

          <section class="panel log-panel">
            <div class="section-heading">
              <h2>Console</h2>
              <div class="log-actions">
                <button class="ghost small" id="clearLogs" type="button">Clear</button>
                <button class="ghost small" id="downloadLogs" type="button" disabled>Download</button>
              </div>
            </div>
            <pre class="logs" id="logs"></pre>
          </section>
        </section>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
